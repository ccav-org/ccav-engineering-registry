server {
    listen 443 ssl;

    # ── CCAV 限流（三弟 2026-06-28 新增 · 大哥批复）──────
    # 全局并发连接限制 — 单IP最多10并发
    limit_conn ccav_conn 10;
    limit_conn_status 429;
    server_name ccav.com www.ccav.com 43.159.170.161;
    ssl_certificate /etc/letsencrypt/live/ccav.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ccav.com/privkey.pem; # managed by Certbot
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 安全响应头（三弟 2026-06-17 新增）────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 安全扫描防护（三弟 2026-06-23 新增）────────────────────
    location ~ /\.(git|svn|env|aws|htaccess|htpasswd) {
        deny all;
        return 444;
    }
    location ~* (wp-login|wp-admin|xmlrpc|phpmyadmin|.php$) {
        deny all;
        return 444;
    }
    location ~ /\.well-known {
        allow all;
    }
    # 关闭无效方法
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 444;
    }
    # ─────────────────────────────────────────────────────────
    # ─────────────────────────────────────────────────────────
    root /var/www/ccav;
    index index.html;

    # CCAV 报名系统 V1 — Ops API
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/enrollment/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/payment/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/refund/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/class_change/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/dashboard/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/public/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }


    # Rewrite: /api/gallery/gallery and /api/gallery/works → /api/gallery
    location = /api/gallery/gallery {
        rewrite ^ /api/gallery break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/gallery/works {
        rewrite ^ /api/gallery break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Form server — teacher training / partner / textbook / certification registration
    location /api/register/ {
        # -- Rate limit: 5r/s per IP (大哥2026-06-25批复) --
        limit_req zone=ccav_register burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:9091/register/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API Versioning (CP-VER-API-001) ────────────────
    location /api/v1/node/ {
        rewrite ^/api/v1/node/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/gateway/ {
        rewrite ^/api/v1/gateway/(.*)$ /$1 break;
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── L3 Provider API (CP-L3-001) ──────────────
    location /api/v1/generate {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/providers {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── P04-04-I: /api/v1/* blocked at Nginx layer (2026-06-26) ──
    location /api/v1/ {
        return 403;
    }

    # ── L3 AI Routes (CP-L3-002) — Gateway handles all AI execution ──
    location /api/kimi/chat {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    location /api/optimize {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    location /api/kling/ {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    location /api/replicate/ {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    location /api/generate {
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }
    # ────────────────────────────────────────────────────────────────

    location /api/ {
                # -- Rate limit: 5r/s burst=20 per IP (大哥2026-06-28批复) --
        limit_req zone=ccav_api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }




    # CCAV 报名系统 V1 — Admin 前端 (Next.js standalone)
    # ── Admin 临时 Basic Auth 门禁 ──
    location /admin/ {
        auth_basic "CCAV Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-admin;

        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /board/ {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Unified API entry (CP-API-001) ──────────────────
    location /api/node/ {
        rewrite ^/api/node/(.*)$ /api/$1 break;
        proxy_pass http://ccav_data_proxy_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/gateway/ {
        rewrite ^/api/gateway/(.*)$ /$1 break;
        proxy_pass http://ccav_gateway_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── CCAV V1 Gateway Dry Run (Phase 01j/01m) ──────────
    # 受控灰度接口 — 护栏版本
    # 仅 GET/POST → 1r/s 限流 → header gate → 独立日志
    # ─────────────────────────────────────────────────────────
    location ^~ /gateway-api/ {
        # ── Method restriction ───────────────────────────
        if ($request_method !~ ^(GET|POST)$) {
            return 405;
        }

        # ── Header-based access control ──────────────────
        if ($http_x_ccav_gateway_dryrun != "phase01j") {
            return 403;
        }

        # ── Rate limit ───────────────────────────────────
        limit_req zone=ccav_gateway_api burst=50 nodelay;

        # ── Body size ────────────────────────────────────
        client_max_body_size 1m;

        # ── Timeouts ─────────────────────────────────────
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # ── Headers ──────────────────────────────────────
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Proxy to local Gateway ───────────────────────
        rewrite ^/gateway-api/(.*)$ /$1 break;
        proxy_pass http://ccav_gateway_ha;

        # ── Independent logging ──────────────────────────
        access_log /var/log/nginx/ccav-gateway-api.access.log;
        error_log /var/log/nginx/ccav-gateway-api.error.log warn;
    }

    # Static assets with content hashes — safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # HTML — never cache, always fresh
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 安全扫描防护（三弟 2026-06-23 新增）────────────────────
    location ~ /\.(git|svn|env|aws|htaccess|htpasswd) {
        deny all;
        return 444;
    }
    location ~* (wp-login|wp-admin|xmlrpc|phpmyadmin|.php$) {
        deny all;
        return 444;
    }
    location ~ /\.well-known {
        allow all;
    }
    # 关闭无效方法
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 444;
    }
    # ─────────────────────────────────────────────────────────
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;


    # ── 网站统计分析（GoAccess — 三弟 2026-06-25 上线）──────
    location /stats {
        alias /var/www/ccav/stats;
        index index.html;
        auth_basic "CCAV Analytics";
        auth_basic_user_file /etc/nginx/.htpasswd-stats;
        
    }
    # ─────────────────────────────────────────────────────────

    # ── Grafana 监控看板（三弟 2026-06-25 上线 ──────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ─────────────────────────────────────────────────
}

server {
    if ($host = www.ccav.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = ccav.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ccav.com www.ccav.com 43.159.170.161;
    return 301 https://$host$request_uri; # HTTP→HTTPS redirect
}
